    <!-- Icons -->

    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect fill='%23025CB6' width='48' height='48' rx='8'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='28' font-weight='bold' fill='white' font-family='Arial, sans-serif'>V</text></svg>" />

    <!-- Apple specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vitrii" />

    <meta name="msapplication-TileColor" content="#025CB6" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vitrii - Marketplace de Produtos e Serviços" />
    <meta property="og:description" content="Marketplace seguro conectando compradores e vendedores com tecnologia QR Code inovadora" />
    <meta property="og:url" content="https://app.vitrii.com.br" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <title>Vitrii - Marketplace de Produtos e Serviços</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/main.tsx"></script>

    <!-- Error handling and Safari compatibility -->
    <script>
      // Detect browser info
      const ua = navigator.userAgent.toLowerCase();
      const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
      const isIOS = /iphone|ipad|ipod/.test(ua);
      const isSafariIOS = isSafari && isIOS;

      // Log current route and browser info
      console.log('[Init]', {
        pathname: window.location.pathname,
        href: window.location.href,
        isSafari,
        isIOS,
        isSafariIOS,
      });

      if (isSafariIOS) {
        document.documentElement.setAttribute('data-browser', 'safari-ios');
        console.log('[compat] Safari iOS detected - applying compatibility patches');
      } else if (isSafari) {
        document.documentElement.setAttribute('data-browser', 'safari');
      }

      // Global error handler to prevent white screen
      let errorCount = 0;
      window.addEventListener('error', (event) => {
        errorCount++;
        console.error('[Error]', errorCount, ':', event.error);

        // Show error UI if app fails to load
        if (errorCount > 5) {
          const root = document.getElementById('root');
          if (root && root.children.length === 0) {
            root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;background:#f5f5f5;"><div style="text-align:center;padding:20px;"><h2 style="color:#333;">⚠️ Erro ao carregar a página</h2><p style="color:#666;">Tente recarregar ou contate o suporte</p><button onclick="window.location.reload()" style="margin-top:20px;padding:10px 20px;background:#025CB6;color:white;border:none;border-radius:4px;cursor:pointer;">Recarregar</button></div></div>';
          }
        }
      });

      // Handle unhandled promise rejections
      window.addEventListener('unhandledrejection', (event) => {
        // Suppress WebSocket errors from Vite dev client - they don't affect functionality
        if (event.reason && event.reason.message && event.reason.message.includes('WebSocket')) {
          console.log('[Dev] WebSocket reconnection attempt...');
          return; // Don't log/throw WebSocket errors
        }
        console.error('[UnhandledRejection]', event.reason);
      });

      // Polyfill for older Safari versions if needed
      if (!window.requestIdleCallback) {
        window.requestIdleCallback = function(callback) {
          return setTimeout(callback, 1);
        };
      }
      if (!window.cancelIdleCallback) {
        window.cancelIdleCallback = function(id) {
          clearTimeout(id);
        };
      }
    </script>
  </body>
</html>
